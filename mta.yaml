_schema-version: "3.1"
ID: employee-onboarding-platform
version: 1.0.0

parameters:
  enable-parallel-deployments: true

build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production

modules:
  # ✅ CAP Backend
  - name: employee-onboarding-srv
    type: nodejs
    path: gen/srv
    parameters:
      memory: 512M
    requires:
      - name: employee-onboarding-db
      - name: employee-onboarding-auth
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}

  # ✅ DB Deployer
  - name: employee-onboarding-db-deployer
    type: hdb
    path: gen/db
    parameters:
      memory: 256M
    requires:
      - name: employee-onboarding-db

  # ✅ App Router
  - name: employee-onboarding-router
    type: approuter.nodejs
    path: app/router
    parameters:
      memory: 256M
    requires:
      - name: employee-onboarding-auth
      - name: employee-onboarding-destination
      - name: srv-api
        group: destinations
        properties:
          name: srv-api
          url: ~{srv-url}
          forwardAuthToken: true
    build-parameters:
      requires:
        - name: dashboard
          artifacts:
            - '*'
          target-path: webapp/dashboard
        - name: employees
          artifacts:
            - '*'
          target-path: webapp/employees
        - name: departments
          artifacts:
            - '*'
          target-path: webapp/departments
        - name: documents
          artifacts:
            - '*'
          target-path: webapp/documents
        - name: assets
          artifacts:
            - '*'
          target-path: webapp/assets
        - name: trainings
          artifacts:
            - '*'
          target-path: webapp/trainings
        - name: reports
          artifacts:
            - '*'
          target-path: webapp/reports
        - name: onboarding-tasks
          artifacts:
            - '*'
          target-path: webapp/onboarding-tasks

  # ✅ UI APPS
  - name: dashboard
    type: custom
    path: app/dashboard
    build-parameters:
      builder: custom
      commands:
        - npm install
        - npm run build
      build-result: dist
      supported-platforms: []

  - name: employees
    type: custom
    path: app/employees
    build-parameters:
      builder: custom
      commands:
        - npm install
        - npm run build
      build-result: dist
      supported-platforms: []

  - name: departments
    type: custom
    path: app/departments
    build-parameters:
      builder: custom
      commands:
        - npm install
        - npm run build
      build-result: dist
      supported-platforms: []

  - name: documents
    type: custom
    path: app/documents
    build-parameters:
      builder: custom
      commands:
        - npm install
        - npm run build
      build-result: dist
      supported-platforms: []

  - name: assets
    type: custom
    path: app/assets
    build-parameters:
      builder: custom
      commands:
        - npm install
        - npm run build
      build-result: dist
      supported-platforms: []

  - name: trainings
    type: custom
    path: app/trainings
    build-parameters:
      builder: custom
      commands:
        - npm install
        - npm run build
      build-result: dist
      supported-platforms: []

  - name: reports
    type: custom
    path: app/reports
    build-parameters:
      builder: custom
      commands:
        - npm install
        - npm run build
      build-result: dist
      supported-platforms: []

  - name: onboarding-tasks
    type: custom
    path: app/onboarding-tasks
    build-parameters:
      builder: custom
      commands:
        - npm install
        - npm run build
      build-result: dist
      supported-platforms: []

# ✅ SERVICES
resources:
  - name: employee-onboarding-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared

  - name: employee-onboarding-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json

  - name: employee-onboarding-destination
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite