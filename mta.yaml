_schema-version: "3.1"
ID: employee-onboarding-platform
version: 1.0.0

parameters:
  enable-parallel-deployments: true

build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production

modules:

  # ✅ CAP Backend
  - name: employee-onboarding-srv
    type: nodejs
    path: gen/srv
    parameters:
      memory: 512M
      buildpack: nodejs_buildpack
    requires:
      - name: employee-onboarding-db
      - name: employee-onboarding-auth
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}

  # ✅ Database
  - name: employee-onboarding-db-deployer
    type: hdb
    path: gen/db
    requires:
      - name: employee-onboarding-db

  # ✅ App Router (UI entry point)
  - name: employee-onboarding-router
    type: approuter.nodejs
    path: app/router
    parameters:
      memory: 256M
      keep-existing-routes: true
    requires:
      - name: employee-onboarding-auth
      - name: employee-onboarding-html5-runtime
      - name: employee-onboarding-destination
      - name: srv-api
        group: destinations
        properties:
          name: srv-api
          url: ~{srv-url}
          forwardAuthToken: true

  # ✅ Build UI apps (NO npm install here)
  - name: html5-apps
    type: html5
    path: app
    build-parameters:
      builder: custom
      commands:
        - npx ui5 build --all --config dashboard/ui5.yaml
        - npx ui5 build --all --config employees/ui5.yaml
        - npx ui5 build --all --config departments/ui5.yaml
        - npx ui5 build --all --config documents/ui5.yaml
        - npx ui5 build --all --config assets/ui5.yaml
        - npx ui5 build --all --config trainings/ui5.yaml
        - npx ui5 build --all --config reports/ui5.yaml
        - npx ui5 build --all --config onboarding-tasks/ui5.yaml
      build-result: resources

  # ✅ Deploy UI apps to HTML5 repo
  - name: html5-content
    type: com.sap.application.content
    path: app
    requires:
      - name: employee-onboarding-html5-host
    build-parameters:
      build-result: resources
      requires:
        - name: html5-apps
          artifacts:
            - resources/**
          target-path: resources/

resources:

  - name: employee-onboarding-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared

  - name: employee-onboarding-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: xs-security.json

  - name: employee-onboarding-html5-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-host

  - name: employee-onboarding-html5-runtime
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-runtime

  - name: employee-onboarding-destination
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite
